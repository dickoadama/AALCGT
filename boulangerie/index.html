<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Application complète de gestion de boulangerie : produits, stock, caisse, clients, commandes, employés et rapports.">
  <title>Gestion de Boulangerie</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥖</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Barre latérale -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-logo">🥖</span>
        <span class="brand-name" id="brand-name">Ma Boulangerie</span>
      </div>
      <nav class="nav-menu" id="nav-menu"></nav>
      <div class="sidebar-footer">
        <small>Gestion Boulangerie<br>v1.0 · données locales</small>
      </div>
    </aside>

    <!-- Contenu principal -->
    <div class="content">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
        <h1 class="page-title" id="page-title">Tableau de bord</h1>
        <div class="topbar-actions">
          <button class="icon-btn" id="theme-toggle" aria-label="Thème">🌙</button>
        </div>
      </header>
      <main class="main-content" id="main-content"></main>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
